name: Update Pre-Market CSV

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 5:00 AM CT (CDT = UTC-6, so 11:00 UTC) Mon-Fri
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  update-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch stock data and generate CSV
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python generate_csv.py

      - name: Commit and push latest.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.csv
          git diff --cached --quiet || git commit -m "Update latest.csv - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
